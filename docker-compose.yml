services:
  # Tap: AT Protocol sync utility — backfills + streams records from PDS
  tap:
    image: ghcr.io/bluesky-social/indigo/tap:latest
    env_file: .env
    # Workaround mientras propaga el DNS de pds.transparencia.tech al PDS nuevo.
    # Quitar cuando dig resuelva el IP nuevo en todos los resolvers.
    extra_hosts:
      - "pds.transparencia.tech:104.198.49.18"
    ports:
      - "${TAP_PORT:-2480}:2480"
    volumes:
      - tap-data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Indexer: consumes Tap events → writes to PostgreSQL (Supabase)
  indexer:
    build: ./services/indexer
    env_file: .env
    depends_on:
      - tap
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # GraphQL API: lex-gql auto-generated from lexicons
  graphql:
    build:
      context: .
      dockerfile: services/graphql/Dockerfile
    env_file: .env
    ports:
      - "${GRAPHQL_PORT:-4000}:4000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Observability: Netdata — métricas en tiempo real del Pi + contenedores Docker
  netdata:
    image: netdata/netdata:stable
    container_name: netdata
    hostname: transparencia-pi
    ports:
      - "19999:19999"
    restart: unless-stopped
    cap_add:
      - SYS_PTRACE
    volumes:
      - netdata-config:/etc/netdata
      - netdata-lib:/var/lib/netdata
      - netdata-cache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          memory: 150m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # One-shot: run database migration
  migrate:
    build: ./services/indexer
    env_file: .env
    command: ["node", "dist/migrate.js"]
    restart: "no"

  # One-shot: seed Tap with our DID (triggers backfill)
  seed:
    image: curlimages/curl:latest
    depends_on:
      - tap
    env_file: .env
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "Waiting for Tap to start..."
        sleep 5
        echo "Adding DID to Tap..."
        curl -s -X POST http://tap:2480/repos/add \
          -H "Content-Type: application/json" \
          -d "{\"dids\": [\"${ATPROTO_DID}\"]}"
        echo ""
        echo "Checking Tap health..."
        curl -s http://tap:2480/health
        echo ""
        echo "Seed complete!"
    restart: "no"
    profiles:
      - tools

volumes:
  tap-data:
  netdata-config:
  netdata-lib:
  netdata-cache:
