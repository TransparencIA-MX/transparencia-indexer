services:
  # Tap: AT Protocol sync utility — backfills + streams records from PDS
  tap:
    image: ghcr.io/bluesky-social/indigo/tap:latest
    env_file: .env
    ports:
      - "${TAP_PORT:-2480}:2480"
    volumes:
      - tap-data:/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Indexer: consumes Tap events → writes to PostgreSQL (Supabase)
  indexer:
    build: ./services/indexer
    env_file: .env
    depends_on:
      - tap
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # GraphQL API: lex-gql auto-generated from lexicons
  graphql:
    build:
      context: .
      dockerfile: services/graphql/Dockerfile
    env_file: .env
    ports:
      - "${GRAPHQL_PORT:-4000}:4000"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # One-shot: run database migration
  migrate:
    build: ./services/indexer
    env_file: .env
    command: ["node", "dist/migrate.js"]
    restart: "no"

  # One-shot: seed Tap with our DID (triggers backfill)
  seed:
    image: curlimages/curl:latest
    depends_on:
      - tap
    env_file: .env
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "Waiting for Tap to start..."
        sleep 5
        echo "Adding DID to Tap..."
        curl -s -X POST http://tap:2480/repos/add \
          -H "Content-Type: application/json" \
          -d "{\"dids\": [\"${ATPROTO_DID}\"]}"
        echo ""
        echo "Checking Tap health..."
        curl -s http://tap:2480/health
        echo ""
        echo "Seed complete!"
    restart: "no"
    profiles:
      - tools

volumes:
  tap-data:
